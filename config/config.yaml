artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: https://github.com/entbappy/Branching-tutorial/raw/master/summarizer-data.zip
  local_data_file: artifacts/data_ingestion/summarizer-data.zip
  unzip_dir: artifacts/data_ingestion

data_validation:
  root_dir: artifacts/data_validation
  STATUS_FILE: artifacts/data_validation/status.txt
  ALL_REQUIRED_FILES: ["train", "test", "validation"]

data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_ingestion/samsum_dataset  # We take this dataset as input for our data transformation step.
  tokenizer_name: google/pegasus-cnn_dailymail    # This the final tokenizer we will be using for our model training.

model_trainer:
  root_dir: artifacts/model_trainer
  data_path: artifacts/data_transformation/transformed_dataset  # We take this dataset as input for our model training step.
  model_ckpt: google/pegasus-cnn_dailymail    # This the final model checkpoint we will be using for our model training.

model_evaluation:
  root_dir: artifacts/model_evaluation
  data_path: artifacts/data_transformation/transformed_dataset  # We take this dataset as input for our model evaluation step.
  model_path: artifacts/model_trainer/pegasus-samsum-model  # We take this model as input for our model evaluation step.
  tokenizer_path: artifacts/model_trainer/tokenizer  # We take this tokenizer as input for our model evaluation step.
  metric_file_name: artifacts/model_evaluation/metrics.csv